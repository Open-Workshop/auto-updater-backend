apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: mirrorinstances.auto-updater.miskler.ru
spec:
  group: auto-updater.miskler.ru
  names:
    kind: MirrorInstance
    plural: mirrorinstances
    singular: mirrorinstance
    shortNames:
      - mi
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Enabled
          type: boolean
          jsonPath: .spec.enabled
        - name: SteamApp
          type: integer
          jsonPath: .spec.source.steamAppId
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: LastSync
          type: string
          jsonPath: .status.lastSyncResult
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                enabled:
                  type: boolean
                source:
                  type: object
                  properties:
                    steamAppId:
                      type: integer
                    owGameId:
                      type: integer
                    language:
                      type: string
                sync:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                credentials:
                  type: object
                  properties:
                    secretRef:
                      type: string
                parser:
                  type: object
                  properties:
                    proxyPoolSecretRef:
                      type: string
                steamcmd:
                  type: object
                  properties:
                    proxy:
                      type: object
                      properties:
                        type:
                          type: string
                        secretRef:
                          type: string
                storage:
                  type: object
                  properties:
                    parser:
                      type: object
                      properties:
                        size:
                          type: string
                        storageClassName:
                          type: string
                    runner:
                      type: object
                      properties:
                        size:
                          type: string
                        storageClassName:
                          type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                parserPod:
                  type: string
                runnerPod:
                  type: string
                lastSyncStartedAt:
                  type: string
                lastSyncFinishedAt:
                  type: string
                lastSyncResult:
                  type: string
                lastError:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
