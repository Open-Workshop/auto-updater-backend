{{- if and .Values.ui.auth.enabled (not .Values.ui.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: auto-updater-ui-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auto-updater.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
type: Opaque
stringData:
  username: {{ .Values.ui.auth.username | quote }}
  password: {{ required "ui.auth.password is required when ui.auth.enabled=true and no existingSecret is set" .Values.ui.auth.password | quote }}
{{- end }}
