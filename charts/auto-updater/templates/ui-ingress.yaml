{{- if .Values.ui.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: auto-updater-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auto-updater.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
  annotations:
    {{- toYaml .Values.ui.ingress.annotations | nindent 4 }}
spec:
  {{- if .Values.ui.ingress.className }}
  ingressClassName: {{ .Values.ui.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.ui.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: auto-updater-ui
                port:
                  number: {{ $.Values.ui.service.port }}
          {{- end }}
    {{- end }}
  {{- with .Values.ui.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
