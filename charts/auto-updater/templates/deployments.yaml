apiVersion: apps/v1
kind: Deployment
metadata:
  name: auto-updater-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auto-updater.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "auto-updater.name" . }}
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        {{- include "auto-updater.labels" . | nindent 8 }}
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: auto-updater-operator
      containers:
        - name: operator
          image: {{ include "auto-updater.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["operator"]
          env:
            - name: AUTO_UPDATER_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: AUTO_UPDATER_IMAGE
              value: {{ include "auto-updater.image" . | quote }}
            - name: AUTO_UPDATER_SINGBOX_IMAGE
              value: {{ include "auto-updater.singboxImage" . | quote }}
            - name: AUTO_UPDATER_RECONCILE_INTERVAL
              value: {{ .Values.operator.reconcileInterval | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auto-updater-ui
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "auto-updater.labels" . | nindent 4 }}
    app.kubernetes.io/component: ui
spec:
  replicas: {{ .Values.ui.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "auto-updater.name" . }}
      app.kubernetes.io/component: ui
  template:
    metadata:
      labels:
        {{- include "auto-updater.labels" . | nindent 8 }}
        app.kubernetes.io/component: ui
    spec:
      serviceAccountName: auto-updater-ui
      containers:
        - name: ui
          image: {{ include "auto-updater.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["ui"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: AUTO_UPDATER_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: OW_UI_PORT
              value: "8080"
            - name: OW_UI_BASE_PATH
              value: {{ .Values.ui.basePath | quote }}
            {{- if .Values.ui.auth.enabled }}
            - name: OW_UI_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ui.auth.existingSecret | default "auto-updater-ui-auth" }}
                  key: username
            - name: OW_UI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ui.auth.existingSecret | default "auto-updater-ui-auth" }}
                  key: password
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
